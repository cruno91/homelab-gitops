name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: yamllint
        run: |
          pip install --user yamllint==1.35.1
          yamllint .

      - name: Install kubeconform
        run: |
          set -euo pipefail
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | sudo tar xz -C /usr/local/bin/ kubeconform
          kubeconform -v

      - name: Run kubeconform
        run: |
          set -euo pipefail
          # Validate every yaml under bootstrap/, clusters/, platform/, apps/
          # except kustomization files (the kustomize Kustomization kind isn't
          # in standard catalogs; the render job covers kustomization
          # correctness separately by running `kustomize build`).
          # Exclusions:
          # - kustomization files: not in standard schema catalogs; render job
          #   covers them by actually running `kustomize build`
          # - *values.yaml: Helm values, not K8s manifests; render job covers
          #   them by running `helm template`
          find_args=(
            bootstrap clusters platform apps
            -type f
            \( -name '*.yaml' -o -name '*.yml' \)
            ! -name 'kustomization.yaml' ! -name 'kustomization.yml'
            ! -name 'values.yaml' ! -name '*-values.yaml'
          )
          count=$(find "${find_args[@]}" 2>/dev/null | wc -l | tr -d ' ')
          printf 'Validating %s files\n' "$count"
          if [ "$count" -eq 0 ]; then
            exit 0
          fi
          find "${find_args[@]}" -print0 2>/dev/null \
            | xargs -0 kubeconform -strict -summary \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

  secrets-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Any file named *.enc.yaml MUST contain a top-level `sops:` block and at
      # least one ENC[ value. Catches the "wrote a new secret, named it .enc.yaml,
      # forgot to `sops -e -i`" footgun before the plaintext lands on GitHub.
      - name: Verify *.enc.yaml files are SOPS-encrypted
        run: |
          set -euo pipefail
          fail=0
          mapfile -t files < <(find . -type f \( -name '*.enc.yaml' -o -name '*.enc.yml' \) -not -path './.git/*')
          if [ ${#files[@]} -eq 0 ]; then
            echo "No *.enc.yaml files found yet — nothing to check."
            exit 0
          fi
          for f in "${files[@]}"; do
            if ! grep -q '^sops:' "$f"; then
              echo "::error file=$f::Missing 'sops:' top-level metadata — file is named *.enc.yaml but is not SOPS-encrypted"
              fail=1
              continue
            fi
            if ! grep -q 'ENC\[' "$f"; then
              echo "::error file=$f::No ENC[...] values found — file appears unencrypted"
              fail=1
            fi
          done
          exit $fail

  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.3

      - name: Add argo helm repo
        run: helm repo add argo https://argoproj.github.io/argo-helm

      # Pull the chart version from argocd-app.yaml so the render check breaks
      # the moment the pinned version drifts from a working render.
      - name: Render argo-cd chart with bootstrap values
        run: |
          set -euo pipefail
          version=$(awk '/targetRevision:/ {print $2; exit}' bootstrap/argocd-app.yaml)
          echo "Rendering argo-cd chart version $version with bootstrap/argocd-values.yaml"
          helm template argocd argo/argo-cd \
            --version "$version" \
            --namespace argocd \
            -f bootstrap/argocd-values.yaml > /dev/null

      - name: Kustomize build each clusters/*
        run: |
          set -euo pipefail
          for d in clusters/*/; do
            echo "=== $d ==="
            kubectl kustomize "$d" > /dev/null
          done

      # platform/ is the umbrella that mgmt's platform-mgmt Application points
      # at; each platform/<component>/extras/ is the multi-source extras dir
      # for that component's ApplicationSet template. Catch kustomize errors
      # in either layer before they reach Argo.
      - name: Kustomize build platform umbrella + each platform/*/extras
        run: |
          set -euo pipefail
          if [ -f platform/kustomization.yaml ]; then
            echo "=== platform/ ==="
            kubectl kustomize platform > /dev/null
          fi
          for d in platform/*/extras/; do
            [ -d "$d" ] || continue
            echo "=== $d ==="
            kubectl kustomize "$d" > /dev/null
          done

      # Render every chart that's pinned in a platform/<component>/appset.yaml
      # so a stale chart version or bad values fail CI before they fail Argo.
      - name: Render platform charts
        run: |
          set -euo pipefail
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm template cert-manager jetstack/cert-manager \
            --version v1.20.2 \
            --namespace cert-manager \
            --set crds.enabled=true \
            --set global.leaderElection.namespace=cert-manager > /dev/null
