---
# Cross-namespace attachment to the shared `yavin` Gateway. No ReferenceGrant
# needed because the Gateway listener has `allowedRoutes.namespaces.from: All`.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello-world
  namespace: hello-world
spec:
  parentRefs:
    - name: yavin
      namespace: envoy-gateway-system
  hostnames:
    - hello.edge.yavin.internal
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hello-world
          port: 80
