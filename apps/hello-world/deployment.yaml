---
# traefik/whoami is multi-arch (amd64 + arm64) so it runs on edge Pis without
# a manifest list dance. Returns request details on every response, which is
# convenient for confirming traffic actually traversed Pi-hole DNS, klipper-lb,
# the Envoy data plane, and the right backend pod.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world
  namespace: hello-world
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.10.4
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
