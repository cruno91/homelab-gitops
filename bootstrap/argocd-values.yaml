global:
  domain: argocd.yavin.internal

server:
  # Pi-hole round-robins argocd.yavin.internal to the three RKE2 nodes;
  # rke2-ingress-nginx on each hostPort 443 terminates TLS at the ingress.
  # argocd-server speaks plain HTTP behind it.
  service:
    type: ClusterIP
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.yavin.internal
    annotations:
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

configs:
  params:
    server.insecure: "true"
  cm:
    application.instanceLabelKey: argocd.argoproj.io/instance
    timeout.reconciliation: 180s
    # Suppress benign Synced=OutOfSync drift caused by CRD-schema defaults
    # the API server fills in on apply but git doesn't list. Argo's diff
    # logic for HTTPRoute and Gateway doesn't reconcile these on its own
    # (VAPB does — handled via SSA managedFields stabilization without
    # needing an entry here). Applies cluster-wide to the listed kinds, so
    # any future HTTPRoute / Gateway resource is covered automatically.
    # Drop a jqPathExpression only if the field starts mattering (e.g. you
    # want to deliberately set backendRefs[].weight on an HTTPRoute).
    resource.customizations.ignoreDifferences.gateway.networking.k8s.io_HTTPRoute: |
      jqPathExpressions:
        - .spec.parentRefs[].group
        - .spec.parentRefs[].kind
        - .spec.rules[].backendRefs[].group
        - .spec.rules[].backendRefs[].kind
        - .spec.rules[].backendRefs[].weight
    resource.customizations.ignoreDifferences.gateway.networking.k8s.io_Gateway: |
      jqPathExpressions:
        - .spec.listeners[].tls.certificateRefs[].group
        - .spec.listeners[].tls.certificateRefs[].kind

dex:
  enabled: false

notifications:
  enabled: false
