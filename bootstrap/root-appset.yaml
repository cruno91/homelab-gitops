apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-bootstrap
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/cruno91/homelab-gitops.git
        revision: main
        directories:
          - path: clusters/*
          # sandbox-template is a baseline stamped onto ephemeral clusters, never applied directly
          - path: clusters/sandbox-template
            exclude: true
  template:
    metadata:
      name: '{{.path.basename}}-bootstrap'
    spec:
      project: default
      source:
        repoURL: https://github.com/cruno91/homelab-gitops.git
        targetRevision: main
        path: '{{.path.path}}'
      destination:
        # mgmt targets the in-cluster API directly (server-URL form, no cluster Secret needed);
        # edge/dev resolve by name and require `argocd cluster add --name <name>` first.
        # Argo treats an empty-string server-or-name as "not set" and uses the populated one.
        server: '{{ if eq .path.basename "mgmt" }}https://kubernetes.default.svc{{ end }}'
        name: '{{ if ne .path.basename "mgmt" }}{{ .path.basename }}{{ end }}'
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
