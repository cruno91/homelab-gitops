apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-bootstrap
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/cruno91/homelab-gitops.git
        revision: main
        directories:
          - path: clusters/*
          # sandbox-template is a baseline stamped onto ephemeral clusters, never applied directly
          - path: clusters/sandbox-template
            exclude: true
  template:
    metadata:
      name: '{{.path.basename}}-bootstrap'
    spec:
      project: default
      source:
        repoURL: https://github.com/cruno91/homelab-gitops.git
        targetRevision: main
        path: '{{.path.path}}'
      destination:
        # Every cluster's bootstrap Application carries Argo CD Application
        # resources (per-cluster workload Apps); those Applications are
        # reconciled by the Argo controller on mgmt regardless of which
        # cluster they ultimately target. So all bootstraps apply to mgmt's
        # argocd namespace. Each child Application's own destination field
        # decides which cluster the workload lands on.
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
