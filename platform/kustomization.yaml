apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Umbrella for all platform-component ApplicationSets. Applied to mgmt by the
# `platform-mgmt` Application in clusters/mgmt/apps.yaml. New components add
# their `appset.yaml` here.
resources:
  - cert-manager/appset.yaml
  - gateway-api/appset.yaml
  - envoy-gateway/appset.yaml
  - envoy-gateway/listener-appset.yaml
