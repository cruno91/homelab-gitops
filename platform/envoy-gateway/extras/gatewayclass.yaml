---
# Single shared GatewayClass per cluster. Gateway resources reference this by
# `gatewayClassName: envoy`; the controllerName matches what the Envoy Gateway
# Helm chart's controller watches. parametersRef points at the EnvoyProxy CR
# above so every Gateway gets the DaemonSet+LoadBalancer data plane shape.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: shared
    namespace: envoy-gateway-system
