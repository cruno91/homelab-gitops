---
# Wildcard cert for *.yavin.internal, issued by the SelfSigned ClusterIssuer
# from the cert-manager component. Transitional: when step-ca lands the
# issuerRef gets repointed at the step-ca ClusterIssuer and the resulting cert
# becomes trust-chain-verifiable on workstations that trust step-ca's root.
# Until then, browsers warn on click-through.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-yavin-internal
  namespace: envoy-gateway-system
spec:
  secretName: wildcard-yavin-internal-tls
  commonName: "*.yavin.internal"
  dnsNames:
    - "yavin.internal"
    - "*.yavin.internal"
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
    group: cert-manager.io
